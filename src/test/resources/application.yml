spring:
  application:
    name: saga-test

  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

  liquibase:
    enabled: false

  kafka:
    bootstrap-servers: localhost:9092
    listener:
      auto-startup: false

  cloud:
    vault:
      enabled: false

app:
  jwt:
    secret: bXlTdXBlclNlY3JldEtleUZvckpXVFRva2VuR2VuZXJhdGlvblRoYXRJc0xvbmdFbm91Z2gyMDI0
    access-token-expiration: 900000
    refresh-token-expiration: 86400000

  rate-limit:
    capacity: 100
    refill-tokens: 100
    refill-duration-seconds: 60
